<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Flappy Bird — Nexa Arcade</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Tap or press Space to fly the bird through the pipes. A fast, free arcade classic." />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="wrap">
      <h1>Flappy Bird</h1>
      <p class="hint">Tap the screen / click / press <b>Space</b> or <b>↑</b> to flap. Avoid the pipes!</p>
      <canvas id="myCanvas" width="400" height="560"></canvas>
    </div>
    <script src="script.js"></script>
  </body>
</html>
