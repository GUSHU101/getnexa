<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Asteroid Dash</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#07080f;overflow:hidden;font-family:'Orbitron',monospace;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh}
canvas{position:absolute;top:0;left:0;width:100%;height:100%;touch-action:none}
#hud{position:absolute;top:16px;left:50%;transform:translateX(-50%);display:flex;gap:20px;background:rgba(0,0,0,.65);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1);border-radius:100px;padding:10px 24px;z-index:10;font-size:13px;font-weight:700;letter-spacing:.1em;display:none}
#hud .lbl{color:rgba(255,255,255,.4);font-size:9px;text-transform:uppercase;letter-spacing:.12em}
#hud .val{color:#00e5ff}
#ui{position:absolute;text-align:center;z-index:10}
#ui h1{font-size:clamp(22px,6vw,38px);font-weight:900;letter-spacing:.08em;margin-bottom:8px;background:linear-gradient(135deg,#fff,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#ui p{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:6px;letter-spacing:.08em}
#ui .keys{font-size:11px;color:rgba(255,255,255,.3);margin-bottom:24px}
#start-btn{background:#818cf8;color:#fff;border:none;padding:13px 38px;border-radius:100px;font-family:'Orbitron',monospace;font-size:13px;font-weight:700;letter-spacing:.12em;cursor:pointer;transition:all .2s}
#start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(129,140,248,.5)}
#arrows{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:none;gap:10px;z-index:10}
.arrow-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:10px;width:52px;height:52px;font-size:20px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;-webkit-user-select:none}
</style>
</head><body>
<canvas id="c"></canvas>
<div id="hud">
  <div><div class="lbl">Score</div><div class="val" id="sc">0</div></div>
  <div><div class="lbl">Lives</div><div class="val" id="lv">3</div></div>
  <div><div class="lbl">Level</div><div class="val" id="lvl">1</div></div>
</div>
<div id="ui">
  <h1>ASTEROID DASH</h1>
  <p>Dodge the rocks. Survive.</p>
  <div class="keys">← → Arrow keys or tap buttons</div>
  <button id="start-btn">LAUNCH SHIP</button>
</div>
<div id="arrows">
  <div class="arrow-btn" id="btn-l">◀</div>
  <div class="arrow-btn" id="btn-r">▶</div>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const hudEl=document.getElementById('hud'),ui=document.getElementById('ui');
const scEl=document.getElementById('sc'),lvEl=document.getElementById('lv'),lvlEl=document.getElementById('lvl');
const arrowsEl=document.getElementById('arrows');
let W,H,ship,rocks=[],particles=[],score=0,lives=3,level=1,running=false,animId;
let keys={left:false,right:false};

function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
window.addEventListener('resize',resize);resize();

class Ship{
  constructor(){this.w=22;this.h=32;this.x=W/2;this.y=H-80;this.vx=0;this.invincible=0}
  update(){
    if(keys.left)this.vx-=0.8;
    if(keys.right)this.vx+=0.8;
    this.vx*=0.88;
    this.x=Math.max(this.w,Math.min(W-this.w,this.x+this.vx));
    if(this.invincible>0)this.invincible--;
  }
  draw(){
    ctx.save();
    if(this.invincible>0&&Math.floor(this.invincible/5)%2)return ctx.restore();
    const g=ctx.createLinearGradient(this.x-this.w,this.y,this.x+this.w,this.y);
    g.addColorStop(0,'#818cf8');g.addColorStop(1,'#00e5ff');
    ctx.fillStyle=g;
    ctx.beginPath();ctx.moveTo(this.x,this.y-this.h);
    ctx.lineTo(this.x-this.w,this.y+this.h*.6);
    ctx.lineTo(this.x,this.y+this.h*.2);
    ctx.lineTo(this.x+this.w,this.y+this.h*.6);
    ctx.closePath();ctx.fill();
    // engine glow
    ctx.fillStyle='#f59e0b88';
    ctx.beginPath();ctx.ellipse(this.x,this.y+this.h*.6,8,5+Math.random()*6,0,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
  hits(r){return Math.hypot(this.x-r.x,this.y-r.y)<r.r+12}
}

class Rock{
  constructor(lvl){
    this.r=18+Math.random()*24;
    this.x=this.r+Math.random()*(W-this.r*2);
    this.y=-this.r;
    this.vy=(1.5+Math.random()*2)*(1+lvl*.12);
    this.vx=(Math.random()-.5)*2;
    this.rot=0;this.rspd=(Math.random()-.5)*.06;
    this.sides=Math.floor(5+Math.random()*4);
    this.pts=[];
    for(let i=0;i<this.sides;i++){const a=i/this.sides*Math.PI*2;const r=this.r*(.7+Math.random()*.3);this.pts.push([Math.cos(a)*r,Math.sin(a)*r]);}
  }
  update(){this.y+=this.vy;this.x+=this.vx;this.rot+=this.rspd}
  draw(){
    ctx.save();ctx.translate(this.x,this.y);ctx.rotate(this.rot);
    ctx.beginPath();ctx.moveTo(...this.pts[0]);
    this.pts.slice(1).forEach(p=>ctx.lineTo(...p));ctx.closePath();
    ctx.fillStyle='rgba(99,102,241,.25)';ctx.fill();
    ctx.strokeStyle='rgba(129,140,248,.7)';ctx.lineWidth=2;ctx.stroke();
    ctx.restore();
  }
}

function explode(x,y){
  for(let i=0;i<12;i++){
    const a=Math.random()*Math.PI*2,sp=2+Math.random()*4;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,r:3+Math.random()*3,col:`hsl(${30+Math.random()*40},100%,60%)`});
  }
}

function spawnRate(){return Math.max(0.01,0.03-level*.002)}

function loop(){
  animId=requestAnimationFrame(loop);
  // star bg
  ctx.fillStyle='rgba(7,8,15,.25)';ctx.fillRect(0,0,W,H);
  ship.update();ship.draw();
  if(Math.random()<spawnRate())rocks.push(new Rock(level));
  for(let i=rocks.length-1;i>=0;i--){
    const r=rocks[i];r.update();r.draw();
    if(r.y-r.r>H){rocks.splice(i,1);score++;scEl.textContent=score;continue}
    if(ship.invincible===0&&ship.hits(r)){
      explode(r.x,r.y);rocks.splice(i,1);lives--;lvEl.textContent=lives;
      ship.invincible=120;
      if(lives<=0){endGame();return}
    }
  }
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.life-=0.05;
    if(p.life<=0){particles.splice(i,1);continue}
    ctx.globalAlpha=p.life;ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }
  if(score>=level*12){level++;lvlEl.textContent=level;}
}

function endGame(){
  running=false;cancelAnimationFrame(animId);
  ctx.fillStyle='rgba(0,0,0,.8)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#fff';ctx.font='bold 36px Orbitron,monospace';ctx.textAlign='center';
  ctx.fillText('DESTROYED',W/2,H/2-40);
  ctx.font='18px Orbitron,monospace';ctx.fillStyle='#818cf8';
  ctx.fillText('Score: '+score,W/2,H/2+10);
  ctx.fillStyle='rgba(255,255,255,.4)';ctx.font='13px Orbitron,monospace';
  ctx.fillText('Tap to restart',W/2,H/2+50);
  hudEl.style.display='none';arrowsEl.style.display='none';
  if(window.parent!==window)window.parent.postMessage({type:'score',game:'asteroid-dash',score},'*');
  canvas.onclick=startGame;
}

function startGame(){
  canvas.onclick=null;score=0;lives=3;level=1;rocks=[];particles=[];running=true;
  scEl.textContent=0;lvEl.textContent=3;lvlEl.textContent=1;
  ship=new Ship();
  ui.style.display='none';hudEl.style.display='flex';arrowsEl.style.display='flex';
  loop();
}

window.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')keys.left=true;if(e.key==='ArrowRight')keys.right=true;});
window.addEventListener('keyup',e=>{if(e.key==='ArrowLeft')keys.left=false;if(e.key==='ArrowRight')keys.right=false;});
document.getElementById('btn-l').addEventListener('pointerdown',()=>{keys.left=true});
document.getElementById('btn-l').addEventListener('pointerup',()=>{keys.left=false});
document.getElementById('btn-r').addEventListener('pointerdown',()=>{keys.right=true});
document.getElementById('btn-r').addEventListener('pointerup',()=>{keys.right=false});
document.getElementById('start-btn').onclick=startGame;
</script>
</body></html>
