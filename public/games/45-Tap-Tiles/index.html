<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tap Tiles</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#07080f;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Orbitron',monospace;color:#fff;padding:16px;overflow:hidden;user-select:none}
h1{font-size:clamp(18px,5vw,30px);font-weight:900;letter-spacing:.1em;margin-bottom:4px;background:linear-gradient(135deg,#fff,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#sub{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:.12em;text-transform:uppercase;margin-bottom:14px}
#hud{display:flex;gap:20px;margin-bottom:12px;font-size:11px;color:rgba(255,255,255,.4);letter-spacing:.1em;text-transform:uppercase}
#hud span{color:#f97316;font-weight:700;font-size:18px;display:block;margin-top:2px}
#timer-bar-wrap{width:min(340px,92vw);height:5px;background:rgba(255,255,255,.1);border-radius:5px;overflow:hidden;margin-bottom:14px}
#timer-bar{height:100%;background:linear-gradient(90deg,#f97316,#ef4444);border-radius:5px;transition:width .05s linear}
#grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:min(340px,92vw)}
.tile{aspect-ratio:1;border-radius:14px;border:2px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);cursor:pointer;position:relative;overflow:hidden;transition:transform .1s}
.tile.active{animation:tileFlash .18s ease-out forwards}
@keyframes tileFlash{0%{transform:scale(1.15);filter:brightness(1.5)}100%{transform:scale(1);filter:brightness(1)}}
.tile.hit{background:rgba(16,185,129,.15)!important;border-color:#10b981!important}
.tile.miss{background:rgba(239,68,68,.15)!important;border-color:#ef4444!important}
.tile-inner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:clamp(20px,5vw,32px);opacity:0;transition:opacity .1s}
.tile.active .tile-inner{opacity:1}
#msg{font-size:13px;font-weight:700;letter-spacing:.08em;min-height:20px;margin-top:12px;text-align:center}
#start-btn{margin-top:14px;background:#f97316;color:#fff;border:none;padding:11px 34px;border-radius:100px;font-family:'Orbitron',monospace;font-size:12px;font-weight:700;letter-spacing:.12em;cursor:pointer;transition:all .2s}
#start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(249,115,22,.5)}
</style>
</head><body>
<h1>TAP TILES</h1>
<div id="sub">Tap the lit tile before it disappears</div>
<div id="hud">
  <div>Score<span id="sc">0</span></div>
  <div>Streak<span id="stk">0</span></div>
  <div>Best<span id="best">0</span></div>
</div>
<div id="timer-bar-wrap"><div id="timer-bar" style="width:100%"></div></div>
<div id="grid"></div>
<div id="msg">Hit the glowing tile!</div>
<button id="start-btn">START TAPPING</button>
<script>
const EMOJIS=['⚡','🎯','💥','🔥','⭐','🎮','💎','🚀','🎵','⚔️','🛡️','🌀'];
const TILE_COUNT=16,TIME_PER_TILE=1800;
let score=0,streak=0,best=+localStorage.getItem('tt-best')||0;
let activeIdx=-1,tileTimer,timerAnim,timeLeft,running=false;
const scEl=document.getElementById('sc'),stkEl=document.getElementById('stk'),bestEl=document.getElementById('best');
const gridEl=document.getElementById('grid'),msgEl=document.getElementById('msg');
const timerBar=document.getElementById('timer-bar'),startBtn=document.getElementById('start-btn');
bestEl.textContent=best;

const tiles=[];
for(let i=0;i<TILE_COUNT;i++){
  const t=document.createElement('div');t.className='tile';
  const inner=document.createElement('div');inner.className='tile-inner';
  t.appendChild(inner);
  t.addEventListener('pointerdown',()=>tapTile(i));
  gridEl.appendChild(t);tiles.push(t);
}

function speed(){return Math.max(500,TIME_PER_TILE-score*40)}

function activateTile(){
  if(!running)return;
  // clear previous
  if(activeIdx>=0){tiles[activeIdx].classList.remove('active');tiles[activeIdx].querySelector('.tile-inner').textContent='';}
  activeIdx=Math.floor(Math.random()*TILE_COUNT);
  const t=tiles[activeIdx];
  const em=EMOJIS[Math.floor(Math.random()*EMOJIS.length)];
  t.querySelector('.tile-inner').textContent=em;
  t.classList.add('active');
  // color cycle
  const hue=Math.floor(Math.random()*360);
  t.style.background=`hsla(${hue},90%,55%,.18)`;t.style.borderColor=`hsla(${hue},90%,65%,.6)`;
  t.style.boxShadow=`0 0 20px hsla(${hue},90%,55%,.4)`;
  startTileTimer();
}

function startTileTimer(){
  clearInterval(timerAnim);const dur=speed();timeLeft=dur;
  timerBar.style.width='100%';
  timerAnim=setInterval(()=>{
    timeLeft-=50;timerBar.style.width=Math.max(0,timeLeft/dur*100)+'%';
    if(timeLeft<=0){clearInterval(timerAnim);missedTile();}
  },50);
}

function missedTile(){
  if(!running)return;
  streak=0;stkEl.textContent=0;
  if(activeIdx>=0){tiles[activeIdx].classList.remove('active');tiles[activeIdx].classList.add('miss');tiles[activeIdx].style.background='';tiles[activeIdx].style.borderColor='';tiles[activeIdx].style.boxShadow='';}
  msgEl.textContent='Missed! -streak';msgEl.style.color='#ef4444';
  setTimeout(()=>{if(activeIdx>=0)tiles[activeIdx].classList.remove('miss');msgEl.textContent='';activateTile();},300);
}

function tapTile(i){
  if(!running)return;
  if(i===activeIdx){
    clearInterval(timerAnim);
    score++;streak++;
    scEl.textContent=score;stkEl.textContent=streak;
    if(score>best){best=score;bestEl.textContent=best;localStorage.setItem('tt-best',best);}
    tiles[i].classList.remove('active');tiles[i].classList.add('hit');tiles[i].style.background='';tiles[i].style.borderColor='';tiles[i].style.boxShadow='';
    msgEl.textContent=streak>5?'INSANE! 🔥':streak>2?'Combo x'+streak+' ⚡':'+1';msgEl.style.color='#10b981';
    if(window.parent!==window)window.parent.postMessage({type:'score',game:'tap-tiles',score},'*');
    setTimeout(()=>{tiles[i].classList.remove('hit');msgEl.textContent='';activateTile();},220);
    activeIdx=-1;
  } else if(activeIdx>=0){
    // tapped wrong tile
    tiles[i].style.background='rgba(239,68,68,.1)';
    setTimeout(()=>{tiles[i].style.background='';},200);
  }
}

startBtn.onclick=()=>{
  running=true;score=0;streak=0;activeIdx=-1;
  scEl.textContent=0;stkEl.textContent=0;
  startBtn.style.display='none';msgEl.textContent='';
  activateTile();
};
</script>
</body></html>
