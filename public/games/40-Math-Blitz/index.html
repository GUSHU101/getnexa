<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Math Blitz</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#07080f;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Orbitron',monospace;color:#fff;padding:20px;overflow:hidden}
h1{font-size:clamp(20px,5vw,34px);font-weight:900;letter-spacing:.1em;margin-bottom:6px;background:linear-gradient(135deg,#fff,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#sub{font-size:11px;color:rgba(255,255,255,.4);letter-spacing:.12em;text-transform:uppercase;margin-bottom:24px}
#hud{display:flex;gap:24px;margin-bottom:20px;font-size:11px;color:rgba(255,255,255,.4);letter-spacing:.1em;text-transform:uppercase}
#hud span{color:#f59e0b;font-weight:700;font-size:18px;display:block;margin-top:2px}
#timer-bar-wrap{width:min(320px,90vw);height:5px;background:rgba(255,255,255,.1);border-radius:5px;overflow:hidden;margin-bottom:20px}
#timer-bar{height:100%;background:linear-gradient(90deg,#10b981,#f59e0b,#ef4444);border-radius:5px;transition:width .1s linear;transform-origin:left}
#question{font-size:clamp(28px,8vw,52px);font-weight:900;letter-spacing:.04em;margin:10px 0 24px;min-height:60px;text-align:center;color:#fff}
#choices{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;width:min(300px,90vw)}
.choice{background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.12);border-radius:14px;padding:16px;font-family:'Orbitron',monospace;font-size:18px;font-weight:700;color:#fff;cursor:pointer;transition:all .15s;letter-spacing:.06em}
.choice:hover{background:rgba(245,158,11,.12);border-color:#f59e0b;color:#f59e0b;transform:scale(1.04)}
.choice.correct{background:rgba(16,185,129,.2)!important;border-color:#10b981!important;color:#10b981!important}
.choice.wrong{background:rgba(239,68,68,.2)!important;border-color:#ef4444!important;color:#ef4444!important}
#streak{font-size:11px;color:rgba(255,255,255,.4);letter-spacing:.1em;text-transform:uppercase;margin-top:14px}
#streak span{color:#f59e0b;font-weight:700}
#start-btn{margin-top:20px;background:#f59e0b;color:#000;border:none;padding:12px 36px;border-radius:100px;font-family:'Orbitron',monospace;font-size:13px;font-weight:700;letter-spacing:.12em;cursor:pointer;transition:all .2s;display:none}
#start-btn.show{display:block}
#start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(245,158,11,.5)}
</style>
</head><body>
<h1>MATH BLITZ</h1>
<div id="sub">Rapid-fire mental math — beat the clock</div>
<div id="hud">
  <div>Score<span id="sc">0</span></div>
  <div>Streak<span id="stk">0</span></div>
  <div>Best<span id="best">0</span></div>
</div>
<div id="timer-bar-wrap"><div id="timer-bar" style="width:100%"></div></div>
<div id="question">Ready?</div>
<div id="choices"></div>
<div id="streak">Streak: <span id="streak-label">0</span> 🔥</div>
<button id="start-btn" class="show">START BLITZ</button>
<script>
const scEl=document.getElementById('sc'),stkEl=document.getElementById('stk'),bestEl=document.getElementById('best');
const qEl=document.getElementById('question'),choicesEl=document.getElementById('choices');
const timerBar=document.getElementById('timer-bar'),strkLbl=document.getElementById('streak-label');
const startBtn=document.getElementById('start-btn');
let score=0,streak=0,best=+localStorage.getItem('mb-best')||0,running=false;
let timerAnim,timeLeft,timeTotal;
bestEl.textContent=best;

function randInt(a,b){return Math.floor(Math.random()*(b-a+1))+a}

function genQuestion(diff){
  const ops=diff<5?['+','-']:diff<10?['+','-','×']:diff<15?['+','-','×','÷']:['×','÷','²'];
  const op=ops[randInt(0,ops.length-1)];
  let a,b,ans,str;
  if(op==='+'){ a=randInt(1,Math.min(99,diff*10)); b=randInt(1,Math.min(99,diff*10)); ans=a+b; str=a+' + '+b; }
  else if(op==='-'){ a=randInt(10,Math.min(99,diff*10)); b=randInt(1,a); ans=a-b; str=a+' − '+b; }
  else if(op==='×'){ a=randInt(2,Math.min(12,diff+2)); b=randInt(2,Math.min(12,diff+2)); ans=a*b; str=a+' × '+b; }
  else if(op==='÷'){ b=randInt(2,Math.min(12,diff+2)); ans=randInt(2,12); a=b*ans; str=a+' ÷ '+b; }
  else{ a=randInt(2,Math.min(15,diff)); ans=a*a; str=a+' ²'; }
  // 3 wrong answers
  const wrongs=new Set();
  while(wrongs.size<3){
    let w=ans+randInt(-Math.max(2,Math.round(ans*.3)),Math.max(2,Math.round(ans*.3)));
    if(w!==ans&&w>0)wrongs.add(w);
  }
  const choices=[ans,...wrongs].sort(()=>Math.random()-.5);
  return{str,ans,choices};
}

function startTimer(duration){
  timeTotal=duration;timeLeft=duration;
  clearInterval(timerAnim);
  timerBar.style.width='100%';
  timerAnim=setInterval(()=>{
    timeLeft-=100;
    timerBar.style.width=Math.max(0,timeLeft/timeTotal*100)+'%';
    if(timeLeft<=0){clearInterval(timerAnim);timeUp();}
  },100);
}

function timeUp(){
  if(!running)return;
  // wrong — reset streak
  streak=0;stkEl.textContent=0;strkLbl.textContent=0;
  // flash wrong
  choicesEl.querySelectorAll('.choice').forEach(c=>{
    if(+c.dataset.ans===currentQ.ans)c.classList.add('correct');
    else c.classList.add('wrong');
  });
  setTimeout(()=>nextQuestion(),700);
}

let currentQ=null;
function nextQuestion(){
  if(!running)return;
  const diff=Math.min(20,1+Math.floor(score/5));
  currentQ=genQuestion(diff);
  qEl.textContent=currentQ.str+' = ?';
  choicesEl.innerHTML='';
  currentQ.choices.forEach(c=>{
    const btn=document.createElement('button');
    btn.className='choice';btn.textContent=c;btn.dataset.ans=c;
    btn.onclick=()=>answer(c,btn);
    choicesEl.appendChild(btn);
  });
  startTimer(Math.max(2000,5000-score*80));
}

function answer(val,btn){
  if(!running||!currentQ)return;
  clearInterval(timerAnim);
  const correct=val===currentQ.ans;
  if(correct){
    btn.classList.add('correct');score++;streak++;
    scEl.textContent=score;stkEl.textContent=streak;strkLbl.textContent=streak;
    if(score>best){best=score;bestEl.textContent=best;localStorage.setItem('mb-best',best);}
    if(window.parent!==window)window.parent.postMessage({type:'score',game:'math-blitz',score},'*');
  } else {
    btn.classList.add('wrong');
    choicesEl.querySelectorAll('.choice').forEach(c=>{if(+c.dataset.ans===currentQ.ans)c.classList.add('correct');});
    streak=0;stkEl.textContent=0;strkLbl.textContent=0;
    if(streak===0&&score>0){running=false;endGame();return;}
  }
  setTimeout(()=>nextQuestion(),correct?400:800);
}

function endGame(){
  qEl.textContent='GAME OVER';
  choicesEl.innerHTML='<div style="font-size:14px;color:rgba(255,255,255,.5);text-align:center;padding:20px;">Final Score: <span style="color:#f59e0b;font-size:20px;font-weight:700">'+score+'</span></div>';
  startBtn.classList.add('show');startBtn.textContent='PLAY AGAIN';
}

function startGame(){
  score=0;streak=0;running=true;
  scEl.textContent=0;stkEl.textContent=0;strkLbl.textContent=0;
  startBtn.classList.remove('show');
  nextQuestion();
}
startBtn.onclick=startGame;
</script>
</body></html>
