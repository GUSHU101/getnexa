<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Word Scramble</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#07080f;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Orbitron',monospace;color:#fff;padding:20px;overflow:hidden}
h1{font-size:clamp(18px,5vw,30px);font-weight:900;letter-spacing:.1em;margin-bottom:4px;background:linear-gradient(135deg,#fff,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#sub{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:.12em;text-transform:uppercase;margin-bottom:20px}
#hud{display:flex;gap:20px;margin-bottom:16px;font-size:11px;color:rgba(255,255,255,.4);letter-spacing:.1em;text-transform:uppercase}
#hud span{color:#06b6d4;font-weight:700;font-size:18px;display:block;margin-top:2px}
#timer-bar-wrap{width:min(320px,90vw);height:4px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden;margin-bottom:20px}
#timer-bar{height:100%;background:linear-gradient(90deg,#06b6d4,#10b981);border-radius:4px;transition:width .1s linear}
#scrambled{font-family:'Rajdhani',sans-serif;font-size:clamp(28px,9vw,52px);font-weight:700;letter-spacing:.22em;text-transform:uppercase;margin-bottom:20px;min-height:60px;text-align:center;color:#06b6d4;text-shadow:0 0 20px rgba(6,182,212,.4)}
#hint{font-size:11px;color:rgba(255,255,255,.3);letter-spacing:.08em;margin-bottom:16px;min-height:16px}
#input-wrap{display:flex;gap:10px;margin-bottom:14px;width:min(320px,90vw)}
#answer{flex:1;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.15);border-radius:12px;padding:12px 16px;font-family:'Orbitron',monospace;font-size:16px;color:#fff;outline:none;letter-spacing:.12em;text-transform:uppercase;transition:border-color .2s}
#answer:focus{border-color:#06b6d4;box-shadow:0 0 16px rgba(6,182,212,.2)}
#answer.correct{border-color:#10b981;background:rgba(16,185,129,.1)}
#answer.wrong{border-color:#ef4444;background:rgba(239,68,68,.1)}
#submit{background:#06b6d4;color:#000;border:none;padding:12px 20px;border-radius:12px;font-family:'Orbitron',monospace;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:.08em;transition:all .2s}
#submit:hover{background:#22d3ee;transform:scale(1.04)}
#msg{font-size:13px;font-weight:700;letter-spacing:.08em;min-height:20px;text-align:center;margin-bottom:12px}
#pass-btn{background:none;border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.4);padding:7px 20px;border-radius:100px;font-family:'Orbitron',monospace;font-size:10px;cursor:pointer;letter-spacing:.1em;transition:all .2s;margin-bottom:12px}
#pass-btn:hover{border-color:rgba(255,255,255,.4);color:#fff}
#start-btn{background:#06b6d4;color:#000;border:none;padding:12px 36px;border-radius:100px;font-family:'Orbitron',monospace;font-size:13px;font-weight:700;letter-spacing:.12em;cursor:pointer;transition:all .2s}
#start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(6,182,212,.5)}
</style>
</head><body>
<h1>WORD SCRAMBLE</h1>
<div id="sub">Unscramble before time runs out</div>
<div id="hud">
  <div>Score<span id="sc">0</span></div>
  <div>Streak<span id="stk">0</span></div>
  <div>Best<span id="best">0</span></div>
</div>
<div id="timer-bar-wrap"><div id="timer-bar" style="width:100%"></div></div>
<div id="scrambled">?????</div>
<div id="hint"></div>
<div id="input-wrap">
  <input type="text" id="answer" placeholder="TYPE ANSWER" autocomplete="off" spellcheck="false" maxlength="14">
  <button id="submit">GO</button>
</div>
<div id="msg"></div>
<button id="pass-btn">SKIP WORD</button>
<button id="start-btn">START GAME</button>
<script>
const WORDS=[
  ['PLANET','A sphere orbiting a star'],['ROCKET','Propels into orbit'],['ARCADE','Where games live'],
  ['GALAXY','Billions of stars'],['COMET','Ice ball in space'],['SOLAR','Related to the sun'],
  ['ORBIT','Path around a body'],['LASER','Focused light beam'],['PIXEL','Screen's tiny dot'],
  ['SCORE','Points in a game'],['BOSS','Final level foe'],['COMBO','Chain of moves'],
  ['QUEST','An adventure goal'],['LEVEL','Stage in a game'],['SPAWN','Where you appear'],
  ['LOOT','Game reward drop'],['SHIELD','Blocks damage'],['TURBO','Extra speed boost'],
  ['STORM','Violent weather'],['OCEAN','Vast water body'],['TIGER','Striped big cat'],
  ['FLAME','Hot burning light'],['CRUSH','To squeeze flat'],['BLAZE','Bright fire'],
  ['SWORD','Blade weapon'],['ARROW','Shot from a bow'],['MAGIC','Supernatural force'],
  ['SPEED','Fast movement'],['POWER','Energy or strength'],['GHOST','Invisible spirit'],
  ['CLOUD','Water in the sky'],['FROST','Ice on a surface'],['TOXIC','Poisonous'],
  ['VENOM','Animal poison'],['CHAOS','Complete disorder'],['NEXUS','Central connection'],
  ['CYBER','Digital/computer related'],['NEON','Glowing bright gas'],['HYPER','Extremely active'],
  ['ULTRA','Beyond extreme'],['NOVA','Stellar explosion'],['PULSE','Rhythmic beat'],
  ['DRONE','Flying machine'],['VAULT','Secure storage'],['PRISM','Light splitter'],
];
let score=0,streak=0,best=+localStorage.getItem('ws-best')||0;
let current,timerAnim,timeLeft;
const scEl=document.getElementById('sc'),stkEl=document.getElementById('stk'),bestEl=document.getElementById('best');
const scramEl=document.getElementById('scrambled'),hintEl=document.getElementById('hint');
const ansEl=document.getElementById('answer'),msgEl=document.getElementById('msg');
const timerBar=document.getElementById('timer-bar'),startBtn=document.getElementById('start-btn');
const passBtn=document.getElementById('pass-btn');
let running=false;
bestEl.textContent=best;

function scramble(w){let a=[...w];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a.join('')===w?scramble(w):a.join('')}

function startTimer(ms){
  clearInterval(timerAnim);timeLeft=ms;
  timerBar.style.width='100%';
  timerAnim=setInterval(()=>{
    timeLeft-=80;
    timerBar.style.width=Math.max(0,timeLeft/ms*100)+'%';
    if(timeLeft<=0){clearInterval(timerAnim);timeUp();}
  },80);
}

function timeUp(){
  streak=0;stkEl.textContent=0;
  msgEl.textContent='Time! Answer: '+current[0];msgEl.style.color='#ef4444';
  ansEl.classList.add('wrong');
  setTimeout(()=>nextWord(),1400);
}

function nextWord(){
  if(!running)return;
  ansEl.value='';ansEl.classList.remove('correct','wrong');msgEl.textContent='';
  current=WORDS[Math.floor(Math.random()*WORDS.length)];
  let sc=scramble(current[0]);
  scramEl.textContent=sc;
  hintEl.textContent='Hint: '+current[1];
  startTimer(Math.max(5000,12000-score*300));
  ansEl.focus();
}

function checkAnswer(){
  if(!running||!current)return;
  const val=ansEl.value.trim().toUpperCase();
  if(val===current[0]){
    clearInterval(timerAnim);
    score++;streak++;
    scEl.textContent=score;stkEl.textContent=streak;
    if(score>best){best=score;bestEl.textContent=best;localStorage.setItem('ws-best',best);}
    msgEl.textContent='✓ Correct! +1';msgEl.style.color='#10b981';
    ansEl.classList.add('correct');
    if(window.parent!==window)window.parent.postMessage({type:'score',game:'word-scramble',score},'*');
    setTimeout(()=>nextWord(),700);
  } else {
    ansEl.classList.add('wrong');
    setTimeout(()=>ansEl.classList.remove('wrong'),400);
  }
}

document.getElementById('submit').onclick=checkAnswer;
ansEl.addEventListener('keydown',e=>{if(e.key==='Enter')checkAnswer();});
passBtn.onclick=()=>{if(!running)return;clearInterval(timerAnim);streak=0;stkEl.textContent=0;msgEl.textContent='Skipped: '+current[0];msgEl.style.color='rgba(255,255,255,.4)';setTimeout(()=>nextWord(),800);};

startBtn.onclick=()=>{
  running=true;score=0;streak=0;
  scEl.textContent=0;stkEl.textContent=0;
  startBtn.style.display='none';
  nextWord();
};
</script>
</body></html>
