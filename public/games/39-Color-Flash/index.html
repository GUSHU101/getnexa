<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Color Flash</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#07080f;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Orbitron',monospace;color:#fff;padding:20px;overflow:hidden}
h1{font-size:clamp(20px,5vw,36px);font-weight:900;letter-spacing:.1em;margin-bottom:6px;background:linear-gradient(135deg,#fff,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#sub{font-size:12px;color:rgba(255,255,255,.4);letter-spacing:.1em;text-transform:uppercase;margin-bottom:28px}
#hud{display:flex;gap:24px;margin-bottom:24px;font-size:12px;color:rgba(255,255,255,.5);letter-spacing:.1em}
#hud span{color:#a855f7;font-weight:700;font-size:16px}
#seq-display{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;min-height:60px;margin-bottom:20px;align-items:center}
.seq-dot{width:14px;height:14px;border-radius:50%;opacity:.3;transition:opacity .2s}
.seq-dot.lit{opacity:1;box-shadow:0 0 12px currentColor}
#grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;width:min(280px,90vw)}
.color-btn{border-radius:16px;border:2px solid rgba(255,255,255,.1);height:100px;cursor:pointer;font-size:14px;font-weight:700;letter-spacing:.1em;transition:all .15s;position:relative;overflow:hidden}
.color-btn:hover{transform:scale(1.04);border-color:rgba(255,255,255,.4)}
.color-btn:active{transform:scale(.96)}
.color-btn.flash{opacity:.2}
#msg{font-size:16px;font-weight:700;letter-spacing:.1em;min-height:24px;margin-top:16px;text-align:center}
#start-btn{margin-top:20px;background:#a855f7;color:#fff;border:none;padding:12px 36px;border-radius:100px;font-family:'Orbitron',monospace;font-size:13px;font-weight:700;letter-spacing:.12em;cursor:pointer;transition:all .2s}
#start-btn:hover{background:#c084fc;transform:translateY(-2px);box-shadow:0 8px 24px rgba(168,85,247,.5)}
</style>
</head><body>
<h1>COLOR FLASH</h1>
<div id="sub">Simon Says — remember the sequence</div>
<div id="hud"><div>LEVEL <span id="lvl">1</span></div><div>SCORE <span id="sc">0</span></div><div>BEST <span id="best">0</span></div></div>
<div id="seq-display"></div>
<div id="grid"></div>
<div id="msg">Press Start to play</div>
<button id="start-btn">START GAME</button>
<script>
const COLORS=[
  {id:'r',hex:'#ef4444',name:'RED'},{id:'g',hex:'#10b981',name:'GREEN'},
  {id:'b',hex:'#3b82f6',name:'BLUE'},{id:'y',hex:'#f59e0b',name:'YELLOW'}
];
let seq=[],userIdx=0,level=1,score=0,best=+localStorage.getItem('cf-best')||0,playing=false,accepting=false;

const lvlEl=document.getElementById('lvl'),scEl=document.getElementById('sc'),bestEl=document.getElementById('best');
const seqDisp=document.getElementById('seq-display'),msgEl=document.getElementById('msg');
const grid=document.getElementById('grid');
bestEl.textContent=best;

// Build buttons
const btns={};
COLORS.forEach(c=>{
  const b=document.createElement('button');
  b.className='color-btn';b.dataset.id=c.id;
  b.style.background=c.hex+'33';b.style.borderColor=c.hex+'66';b.style.color=c.hex;
  b.textContent=c.name;
  b.onclick=()=>userInput(c.id);
  grid.appendChild(b);btns[c.id]=b;
});

function updateSeqDisplay(){
  seqDisp.innerHTML='';
  seq.forEach((s,i)=>{
    const d=document.createElement('div');
    d.className='seq-dot';
    d.style.background=COLORS.find(c=>c.id===s).hex;
    d.style.color=COLORS.find(c=>c.id===s).hex;
    seqDisp.appendChild(d);
  });
}

async function flashBtn(id,dur=350){
  const b=btns[id];const c=COLORS.find(x=>x.id===id);
  b.style.background=c.hex;b.style.boxShadow=`0 0 30px ${c.hex}`;
  await sleep(dur);
  b.style.background=c.hex+'33';b.style.boxShadow='';
  await sleep(80);
}

async function playSeq(){
  accepting=false;msgEl.textContent='Watch carefully...';msgEl.style.color='rgba(255,255,255,.5)';
  await sleep(600);
  for(let i=0;i<seq.length;i++){
    // highlight dot
    const dots=seqDisp.children;if(dots[i])dots[i].classList.add('lit');
    await flashBtn(seq[i]);
    if(dots[i])dots[i].classList.remove('lit');
    await sleep(120);
  }
  accepting=true;userIdx=0;
  msgEl.textContent='Your turn! Repeat the sequence.';msgEl.style.color='#a855f7';
}

async function userInput(id){
  if(!playing||!accepting)return;
  await flashBtn(id,180);
  if(id!==seq[userIdx]){
    msgEl.textContent='Wrong! Game over.';msgEl.style.color='#ef4444';
    if(score>best){best=score;localStorage.setItem('cf-best',best);bestEl.textContent=best;}
    if(window.parent!==window)window.parent.postMessage({type:'score',game:'color-flash',score},'*');
    await sleep(1200);playing=false;
    document.getElementById('start-btn').style.display='block';
    msgEl.textContent='Press Start to play again';msgEl.style.color='rgba(255,255,255,.5)';
    return;
  }
  userIdx++;
  if(userIdx===seq.length){
    score+=level;scEl.textContent=score;
    msgEl.textContent='✓ Correct! Level '+(level+1)+'...';msgEl.style.color='#10b981';
    level++;lvlEl.textContent=level;
    seq.push(COLORS[Math.floor(Math.random()*4)].id);
    updateSeqDisplay();
    await sleep(900);
    await playSeq();
  }
}

async function startGame(){
  seq=[COLORS[Math.floor(Math.random()*4)].id];
  level=1;score=0;userIdx=0;playing=true;
  lvlEl.textContent=1;scEl.textContent=0;
  updateSeqDisplay();
  document.getElementById('start-btn').style.display='none';
  await playSeq();
}
document.getElementById('start-btn').onclick=startGame;

function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
</script>
</body></html>
